name: Run HCML Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: pip install -r requirements.txt
      
      - name: Run Bot
        run: python bot.py
        env:
          TOKEN: ${{ secrets.BOT_TOKEN }}
